name: Tests
on:
  workflow_dispatch:
  pull_request:
    types: [opened, reopened]
  push:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache-dependency-path: package-lock.json
      - run: npm install
      - run: npm run build

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache-dependency-path: package-lock.json
      - run: npm install
      - run: npm test

  e2e:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache-dependency-path: package-lock.json
      - run: npm install

      - name: Setup Obsidian (macOS/Linux)
        if: runner.os != 'Windows'
        run: bash ./scripts/setup-obsidian.sh --ci
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Obsidian (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/setup-obsidian.ps1 -CI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Linux: run with virtual display (Xvfb)
      - name: Run e2e:setup (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run --auto-servernum npm run e2e:setup
      - name: Run e2e (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run --auto-servernum npm run e2e

      # macOS and Windows: run directly
      - name: Run e2e:setup
        if: runner.os != 'Linux'
        run: npm run e2e:setup
      - name: Run e2e
        if: runner.os != 'Linux'
        run: npm run e2e

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results-${{ matrix.os }}
          path: e2e-tests/test-results/
          retention-days: 7
